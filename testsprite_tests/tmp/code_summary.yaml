version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite 5
  - Supabase (Auth + Database + Storage + Edge Functions)
  - Shadcn UI
  - Tailwind CSS
  - React Query (TanStack)
  - Recharts
  - date-fns
  - Lucide Icons
routes:
  - path: /
    file: src/pages/Index.tsx
    auth_required: true
    description: Main SPA shell - renders internal pages based on state (dashboard, pacientes, agenda, crm, planos, financeiro, marketing, chat, tarefas, configuracoes)
  - path: /reset-password
    file: src/pages/ResetPassword.tsx
    auth_required: false
    description: Password reset page triggered by email link
features:
  - name: User Login
    description: Login with email and password via Supabase Auth
    files:
      - src/pages/Login.tsx
      - src/contexts/AuthContext.tsx
    entry_route: /
    user_interactions:
      - Fill email input field with placeholder "seu@email.com"
      - Fill password input field
      - Click "Entrar" button to submit
      - See error message "E-mail ou senha incorretos." on invalid credentials
      - Click "Esqueceu a senha?" to trigger forgot password flow
      - Click "Criar conta" to switch to sign up mode
    api_calls:
      - method: POST
        endpoint: supabase.auth.signInWithPassword
    auth_required: false
  - name: User Sign Up
    description: Create new account with name, email, and password
    files:
      - src/pages/Login.tsx
      - src/contexts/AuthContext.tsx
    entry_route: /
    user_interactions:
      - Click "Criar conta" to switch to sign up mode
      - Fill "Nome completo" input
      - Fill email input
      - Fill password input (min 6 chars)
      - Click "Criar conta" button
      - See success message "Conta criada com sucesso!"
    api_calls:
      - method: POST
        endpoint: supabase.auth.signUp
    auth_required: false
  - name: Forgot Password
    description: Send password reset email
    files:
      - src/pages/Login.tsx
    entry_route: /
    user_interactions:
      - Click "Esqueceu a senha?" link
      - Fill email input
      - Click "Enviar link" button
      - See success message about recovery email sent
    api_calls:
      - method: POST
        endpoint: supabase.auth.resetPasswordForEmail
    auth_required: false
  - name: Dashboard
    description: Main dashboard with KPIs, charts, recent patients and upcoming appointments
    files:
      - src/pages/Dashboard.tsx
    entry_route: /
    user_interactions:
      - View KPI cards (patients, appointments, leads, revenue)
      - View charts (appointments by status, revenue trend)
      - Click on quick navigation cards to go to other modules
    api_calls:
      - method: GET
        endpoint: supabase.from('pacientes').select
      - method: GET
        endpoint: supabase.from('consultas').select
      - method: GET
        endpoint: supabase.from('leads').select
      - method: GET
        endpoint: supabase.from('receitas').select
    auth_required: true
  - name: Patients Management
    description: CRUD for dental patients with documents and dental chart
    files:
      - src/pages/Pacientes/index.tsx
    entry_route: /
    user_interactions:
      - View patient list with search and filters
      - Click "+ Novo Paciente" to add patient
      - Fill patient form (nome, telefone, email, cpf, data_nascimento, endereco, observacoes)
      - Click on patient to view details
      - Edit patient information
      - Delete patient
      - Upload patient documents
      - View dental chart (odontograma)
    api_calls:
      - method: GET
        endpoint: supabase.from('pacientes').select
      - method: POST
        endpoint: supabase.from('pacientes').insert
      - method: PATCH
        endpoint: supabase.from('pacientes').update
      - method: DELETE
        endpoint: supabase.from('pacientes').delete
    auth_required: true
  - name: Appointment Schedule
    description: Calendar-based appointment management
    files:
      - src/pages/Agenda/index.tsx
    entry_route: /
    user_interactions:
      - View weekly/daily calendar with appointments
      - Click to create new appointment
      - Select patient, dentist, procedure type, date/time, duration
      - Drag to reschedule appointments
      - Change appointment status (confirmado, cancelado, concluido)
    api_calls:
      - method: GET
        endpoint: supabase.from('consultas').select
      - method: POST
        endpoint: supabase.from('consultas').insert
      - method: PATCH
        endpoint: supabase.from('consultas').update
      - method: DELETE
        endpoint: supabase.from('consultas').delete
    auth_required: true
  - name: CRM Lead Management
    description: Kanban-style CRM with custom funnels and pipeline stages
    files:
      - src/pages/CRM/index.tsx
      - src/pages/CRM/LeadDetailSheet.tsx
    entry_route: /
    user_interactions:
      - View leads in kanban board grouped by funnel stages
      - Drag and drop leads between stages
      - Click "+ Novo Lead" to add lead
      - Fill lead form (nome, telefone, email, origem, interesse)
      - Click on lead card to view details sheet
      - Add follow-up history entries
      - Convert lead to patient
      - Delete lead
      - Search and filter leads
    api_calls:
      - method: GET
        endpoint: supabase.from('leads').select
      - method: POST
        endpoint: supabase.from('leads').insert
      - method: PATCH
        endpoint: supabase.from('leads').update
      - method: DELETE
        endpoint: supabase.from('leads').delete
    auth_required: true
  - name: Financial Management
    description: Revenue and expense tracking with recurring expenses
    files:
      - src/pages/Financeiro/index.tsx
    entry_route: /
    user_interactions:
      - View monthly financial summary (revenue, expenses, balance)
      - Add new revenue entry
      - Add new expense entry
      - Manage recurring expenses
      - Filter by month/year
      - View financial charts
    api_calls:
      - method: GET
        endpoint: supabase.from('receitas').select
      - method: GET
        endpoint: supabase.from('despesas').select
      - method: POST
        endpoint: supabase.from('receitas').insert
      - method: POST
        endpoint: supabase.from('despesas').insert
    auth_required: true
  - name: Marketing ROI
    description: Marketing investment tracking and ROI analysis
    files:
      - src/pages/Marketing/index.tsx
      - src/hooks/useMarketing.ts
    entry_route: /
    user_interactions:
      - View KPI cards (investment, revenue, ROI, CAC)
      - Add marketing investment (channel, amount, month)
      - Set monthly goals (leads, conversions, ROI targets)
      - View investment vs revenue charts
      - View channel performance table
      - Filter by period (3/6/12 months or custom range)
    api_calls:
      - method: GET
        endpoint: supabase.from('marketing_investimentos').select
      - method: GET
        endpoint: supabase.from('marketing_metas').select
      - method: POST
        endpoint: supabase.from('marketing_investimentos').insert
      - method: DELETE
        endpoint: supabase.from('marketing_investimentos').delete
    auth_required: true
  - name: WhatsApp Chat
    description: WhatsApp messaging interface via Evolution API
    files:
      - src/pages/Chat/index.tsx
      - src/components/chat/AudioRecorder.tsx
    entry_route: /
    user_interactions:
      - View conversation list with unread counts
      - Search conversations by name or phone
      - Filter conversations by funnel stage and date
      - Select conversation to view messages
      - Type and send text messages
      - Record and send audio messages
      - View media messages (images, audio, video, documents)
      - Select and bulk delete conversations
    api_calls:
      - method: GET
        endpoint: supabase.from('chat_conversas').select
      - method: GET
        endpoint: supabase.from('chat_mensagens').select
      - method: POST
        endpoint: supabase.functions.invoke('send-message')
    auth_required: true
  - name: Settings
    description: Clinic settings, user management, and integrations
    files:
      - src/pages/Configuracoes/index.tsx
      - src/pages/Configuracoes/UsuariosTab.tsx
    entry_route: /
    user_interactions:
      - Edit clinic information (name, logo, colors, address)
      - Manage users (add, edit roles, deactivate)
      - Configure WhatsApp integration (Evolution API)
      - Configure notification settings
      - Manage custom funnels and stages
    api_calls:
      - method: GET
        endpoint: supabase.from('clinica').select
      - method: PATCH
        endpoint: supabase.from('clinica').update
      - method: GET
        endpoint: supabase.from('usuarios').select
      - method: POST
        endpoint: supabase.from('usuarios').insert
    auth_required: true
  - name: Tasks
    description: Task management with assignments and due dates
    files:
      - src/pages/Tarefas/index.tsx
    entry_route: /
    user_interactions:
      - View task list with filters (status, assignee)
      - Create new task with title, description, due date, assignee
      - Mark task as complete
      - Edit task details
      - Delete task
    api_calls:
      - method: GET
        endpoint: supabase.from('tarefas').select
      - method: POST
        endpoint: supabase.from('tarefas').insert
      - method: PATCH
        endpoint: supabase.from('tarefas').update
      - method: DELETE
        endpoint: supabase.from('tarefas').delete
    auth_required: true
known_limitations:
  - issue: App uses SPA routing with React state instead of URL-based routes; all authenticated pages render under /
    location: src/pages/Index.tsx
    impact: Direct URL navigation to specific modules is not possible; all navigation is state-driven
  - issue: Role-based access is enforced only on the frontend; no server-side middleware guards
    location: src/pages/Index.tsx
    impact: Users could potentially access restricted modules by manipulating state, though RLS on Supabase provides data-level security
  - issue: WhatsApp chat requires active Evolution API instance configured per clinic sector
    location: src/pages/Chat/index.tsx
    impact: Chat features will not work without properly configured Evolution API integration
